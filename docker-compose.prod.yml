services:
  postgres:
    ports: []

  redis:
    ports: []

  minio:
    ports: []
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}

  minio-init:
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required} ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}; do
        echo 'Waiting for MinIO...';
        sleep 1;
      done;
      mc mb --ignore-existing local/${S3_BUCKET:?S3_BUCKET is required};
      "

  key-service:
    ports: []
    environment:
      NODE_ENV: production
      KEY_SERVICE_REGION: ${KEY_SERVICE_REGION:?KEY_SERVICE_REGION is required}
      KEY_SERVICE_COUNTRY: ${KEY_SERVICE_COUNTRY:?KEY_SERVICE_COUNTRY is required}
      KEY_SERVICE_MASTER_KEY_B64: ${KEY_SERVICE_MASTER_KEY_B64:?KEY_SERVICE_MASTER_KEY_B64 is required}
      KEY_SERVICE_CLIENT_TOKEN: ${KEY_SERVICE_CLIENT_TOKEN:?KEY_SERVICE_CLIENT_TOKEN is required}
      KEY_SERVICE_ADMIN_TOKEN: ${KEY_SERVICE_ADMIN_TOKEN:?KEY_SERVICE_ADMIN_TOKEN is required}

  api:
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_URL: ${APP_URL:?APP_URL is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      DATABASE_REPLICA_URL: ${DATABASE_REPLICA_URL:-}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-20}
      DATABASE_POOL_IDLE_TIMEOUT_MS: ${DATABASE_POOL_IDLE_TIMEOUT_MS:-30000}
      DATABASE_POOL_CONNECTION_TIMEOUT_MS: ${DATABASE_POOL_CONNECTION_TIMEOUT_MS:-10000}
      DATABASE_STATEMENT_TIMEOUT_MS: ${DATABASE_STATEMENT_TIMEOUT_MS:-30000}
      DATABASE_QUERY_TIMEOUT_MS: ${DATABASE_QUERY_TIMEOUT_MS:-35000}
      REDIS_URL: redis://redis:6379
      KEY_SERVICE_URL: http://key-service:4100
      KEY_SERVICE_CLIENT_TOKEN: ${KEY_SERVICE_CLIENT_TOKEN:?KEY_SERVICE_CLIENT_TOKEN is required}
      KEY_SERVICE_ADMIN_TOKEN: ${KEY_SERVICE_ADMIN_TOKEN:?KEY_SERVICE_ADMIN_TOKEN is required}
      API_SECURITY_ADMIN_TOKEN: ${API_SECURITY_ADMIN_TOKEN:?API_SECURITY_ADMIN_TOKEN is required}
      API_ENABLE_MOCK_WEBHOOKS: "false"
      AUTH_ACCESS_TOKEN_SECRET: ${AUTH_ACCESS_TOKEN_SECRET:?AUTH_ACCESS_TOKEN_SECRET is required}
      AUTH_REFRESH_TOKEN_SECRET: ${AUTH_REFRESH_TOKEN_SECRET:?AUTH_REFRESH_TOKEN_SECRET is required}
      AUTH_EMAIL_PROVIDER: ${AUTH_EMAIL_PROVIDER:-resend}
      AUTH_EMAIL_FROM: ${AUTH_EMAIL_FROM:?AUTH_EMAIL_FROM is required}
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY is required}
      KYC_DEFAULT_VENDOR: ${KYC_DEFAULT_VENDOR:?KYC_DEFAULT_VENDOR is required}
      KYC_RETURN_URL: ${KYC_RETURN_URL:?KYC_RETURN_URL is required}
      KYC_WEBHOOK_SECRET: ${KYC_WEBHOOK_SECRET:?KYC_WEBHOOK_SECRET is required}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:?S3_PUBLIC_ENDPOINT is required}
      S3_REGION: ${S3_REGION:?S3_REGION is required}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
      S3_FORCE_PATH_STYLE: "true"
      S3_CDN_BASE_URL: ${S3_CDN_BASE_URL:?S3_CDN_BASE_URL is required}
      S3_MAX_IMAGE_UPLOAD_BYTES: ${S3_MAX_IMAGE_UPLOAD_BYTES:-20971520}
      S3_MAX_VIDEO_UPLOAD_BYTES: ${S3_MAX_VIDEO_UPLOAD_BYTES:-104857600}
      S3_MAX_DOCUMENT_UPLOAD_BYTES: ${S3_MAX_DOCUMENT_UPLOAD_BYTES:-10485760}
      S3_PRESIGN_TTL_SECONDS: ${S3_PRESIGN_TTL_SECONDS:-600}
      S3_ALLOWED_CONTENT_TYPES: ${S3_ALLOWED_CONTENT_TYPES:-image/jpeg,image/png,image/webp,image/gif,image/heic,image/heif,video/mp4,video/quicktime,video/x-m4v,application/pdf}
      DECISION_SERVICE_URL: http://ml-service:8000
      EXPO_PUSH_API_URL: ${EXPO_PUSH_API_URL:-https://exp.host/--/api/v2/push/send}
      PUSH_DEFAULT_CHANNEL: ${PUSH_DEFAULT_CHANNEL:-default}
      SENTRY_DSN: ${SENTRY_DSN:?SENTRY_DSN is required}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.15}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_HTTP_URL: ${OTEL_EXPORTER_OTLP_HTTP_URL:-}
      AUCTION_SWEEP_INTERVAL_MS: ${AUCTION_SWEEP_INTERVAL_MS:-30000}
      GOOGLE_OAUTH_CLIENT_IDS: ${GOOGLE_OAUTH_CLIENT_IDS:?GOOGLE_OAUTH_CLIENT_IDS is required}
      APPLE_OAUTH_AUDIENCE: ${APPLE_OAUTH_AUDIENCE:?APPLE_OAUTH_AUDIENCE is required}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      MOLLIE_API_KEY: ${MOLLIE_API_KEY:-}
      MOLLIE_WEBHOOK_SECRET: ${MOLLIE_WEBHOOK_SECRET:-}
      FLUTTERWAVE_SECRET_KEY: ${FLUTTERWAVE_SECRET_KEY:-}
      FLUTTERWAVE_WEBHOOK_SECRET: ${FLUTTERWAVE_WEBHOOK_SECRET:-}
      TAP_SECRET_KEY: ${TAP_SECRET_KEY:-}
      TAP_WEBHOOK_SECRET: ${TAP_WEBHOOK_SECRET:-}
      WISE_API_KEY: ${WISE_API_KEY:-}
      WISE_WEBHOOK_SECRET: ${WISE_WEBHOOK_SECRET:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      EVRI_API_KEY: ${EVRI_API_KEY:-}
      EVRI_API_BASE_URL: ${EVRI_API_BASE_URL:-}
      EVRI_WEBHOOK_SECRET: ${EVRI_WEBHOOK_SECRET:-}
      DELHIVERY_API_KEY: ${DELHIVERY_API_KEY:-}
      DELHIVERY_API_BASE_URL: ${DELHIVERY_API_BASE_URL:-}
      DELHIVERY_WEBHOOK_SECRET: ${DELHIVERY_WEBHOOK_SECRET:-}
      DHL_API_KEY: ${DHL_API_KEY:-}
      DHL_API_BASE_URL: ${DHL_API_BASE_URL:-}
      DHL_WEBHOOK_SECRET: ${DHL_WEBHOOK_SECRET:-}
      ARAMEX_API_KEY: ${ARAMEX_API_KEY:-}
      ARAMEX_API_BASE_URL: ${ARAMEX_API_BASE_URL:-}
      ARAMEX_WEBHOOK_SECRET: ${ARAMEX_WEBHOOK_SECRET:-}
      EASYSHIP_API_KEY: ${EASYSHIP_API_KEY:-}
      EASYSHIP_API_BASE_URL: ${EASYSHIP_API_BASE_URL:-https://public-api.easyship.com/2024-09}
      EASYSHIP_WEBHOOK_SECRET: ${EASYSHIP_WEBHOOK_SECRET:-}
      ALERTING_WEBHOOK_URLS: ${ALERTING_WEBHOOK_URLS:?ALERTING_WEBHOOK_URLS is required}
      ALERTING_ADMIN_USER_IDS: ${ALERTING_ADMIN_USER_IDS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_AGENT_DEFAULT_MODEL: ${OPENAI_AGENT_DEFAULT_MODEL:-gpt-5.6-terra}
      ONEZE_ATTESTATION_SIGNING_SECRET: ${ONEZE_ATTESTATION_SIGNING_SECRET:?ONEZE_ATTESTATION_SIGNING_SECRET is required}
      ONEZE_FX_SYNC_ENABLED: "true"
      ONEZE_FX_SYNC_INTERVAL_MS: ${ONEZE_FX_SYNC_INTERVAL_MS:-86400000}
      ONEZE_FX_PROVIDER_URL: ${ONEZE_FX_PROVIDER_URL:?ONEZE_FX_PROVIDER_URL is required}
      ONEZE_FX_PROVIDER_API_KEY: ${ONEZE_FX_PROVIDER_API_KEY:?ONEZE_FX_PROVIDER_API_KEY is required}
      ONEZE_FX_PROVIDER_BASE_CURRENCY: ${ONEZE_FX_PROVIDER_BASE_CURRENCY:-INR}

  ml-service:
    ports: []
